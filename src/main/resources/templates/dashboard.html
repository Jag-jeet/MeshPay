<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MeshPay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#0f172a;color:#e2e8f0;padding:25px}
.container{max-width:1400px;margin:auto}
header{display:flex;justify-content:space-between;align-items:center;padding:25px 30px;border-radius:20px;
background:linear-gradient(135deg,#2563eb,#7c3aed)}
header h1{font-size:36px}
header p{opacity:.9}
.status{background:#16a34a;padding:10px 18px;border-radius:30px;font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin:25px 0}
.card{background:#1e293b;border-radius:18px;padding:22px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
.card h3{font-size:14px;color:#94a3b8;margin-bottom:8px}
.card h2{font-size:32px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.section{background:#1e293b;padding:22px;border-radius:18px;margin-top:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #334155;text-align:left}
th{color:#94a3b8}
input,select{padding:10px;border-radius:10px;border:none;background:#0f172a;color:white}
button{padding:10px 18px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:600;cursor:pointer}
button:hover{background:#1d4ed8}
.search{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
#log{background:#020617;padding:15px;border-radius:10px;height:250px;overflow:auto;font-family:monospace}
@media(max-width:900px){.grid{grid-template-columns:1fr}header{flex-direction:column;gap:15px;align-items:flex-start}}
</style>
</head>
<body>
<div class="container">
<header>
<div>
<h1>💳 MeshPay</h1>
<p>Offline Mesh Payment Dashboard</p>
</div>
<div class="status">● Backend Connected</div>
</header>

<div class="cards">
<div class="card"><h3>Total Transactions</h3><h2 id="totalTx">0</h2></div>
<div class="card"><h3>Total Amount</h3><h2 id="totalAmount">₹0</h2></div>
<div class="card"><h3>Accounts</h3><h2 id="totalAccounts">0</h2></div>
<div class="card"><h3>Success Rate</h3><h2>100%</h2></div>
</div>

<div class="section">
<h2>Send Payment</h2><br>
<select id="senderVpa"><option>alice@demo</option><option>bob@demo</option><option>carol@demo</option></select>
<select id="receiverVpa"><option>bob@demo</option><option>carol@demo</option><option>alice@demo</option><option>dave@demo</option></select>
<input id="amount" type="number" value="500">
<input id="pin" value="1234">
<button onclick="sendPacket()">Inject</button>
<button onclick="gossip()">Gossip</button>
<button onclick="flushBridges()">Upload</button>
<button onclick="resetMesh()">Reset</button>
</div>

<div class="grid">
<div class="section">
<div class="search"><h2>Transactions</h2><input id="search" placeholder="Search..." onkeyup="filterTable()"></div>
<table id="tx-table">
<thead><tr><th>ID</th><th>From</th><th>To</th><th>Amount</th><th>Status</th></tr></thead>
<tbody></tbody>
</table>
</div>

<div class="section">
<h2>Activity Log</h2><br>
<div id="log"></div>
</div>
</div>

</div>

<script>
function log(t){document.getElementById("log").innerHTML=new Date().toLocaleTimeString()+" - "+t+"<br>"+document.getElementById("log").innerHTML;}
async function refresh(){
const txs=await fetch('/api/transactions').then(r=>r.json());
const acc=await fetch('/api/accounts').then(r=>r.json());

document.getElementById("totalTx").innerText=txs.length;
document.getElementById("totalAccounts").innerText=acc.length;
let total=0;
txs.forEach(t=>total+=parseFloat(t.amount));
document.getElementById("totalAmount").innerText="₹"+total.toFixed(2);

document.querySelector("#tx-table tbody").innerHTML=txs.map(t=>`
<tr>
<td>${t.id}</td>
<td>${t.senderVpa}</td>
<td>${t.receiverVpa}</td>
<td>₹${parseFloat(t.amount).toFixed(2)}</td>
<td>${t.status}</td>
</tr>`).join('');
}
function filterTable(){
let val=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("#tx-table tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(val)?"":"none";
});
}
async function sendPacket(){
const body={senderVpa:senderVpa.value,receiverVpa:receiverVpa.value,amount:parseFloat(amount.value),pin:pin.value,ttl:5,startDevice:"phone-alice"};
const r=await fetch('/api/demo/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
log("Packet "+r.packetId.substring(0,8)+" injected");
refresh();
}
async function gossip(){await fetch('/api/mesh/gossip',{method:'POST'});log("Gossip completed");refresh();}
async function flushBridges(){await fetch('/api/mesh/flush',{method:'POST'});log("Bridge upload complete");refresh();}
async function resetMesh(){await fetch('/api/mesh/reset',{method:'POST'});log("Mesh reset");refresh();}
refresh();
setInterval(refresh,3000);
</script>
</body>
</html>
